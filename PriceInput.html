/**
 * DOM에 요소가 없을 수도 있으므로 안전하게 값 세팅
 * - 즉시 시도
 * - 200ms 후 1회 재시도 (include 렌더링 지연 대응)
 */
function setValueSafely(selector, value) {
    if ($(selector).length) {
        $(selector).val(Math.round(value));
    } else {
        setTimeout(() => {
            if ($(selector).length) {
                $(selector).val(Math.round(value));
            }
        }, 200);
    }
}

//✅ 납부 상태 변경 시 미납/납부액 및 납부일 자동 처리 함수
function updatePaymentFields($select) {
    let $row = $select.closest("tr"); // 현재 선택된 행
    var paymentGubun = "";

     if($select.attr("name")=="receiptCode"){
    	if(parseInt($row.data("price"))==0 && parseInt($row.data("noprice"))==0){
    		$row.find("select[name='paymentGubun']").val("0408");
    	}
    	paymentGubun = $row.find("select[name='paymentGubun']").val();
    }else{
		paymentGubun = $select.val(); // 선택된 납부 상태
    }
	let $price = $row.find("input[name='price']"); // 납부액 필드
    let $noPrice = $row.find("input[name='noPrice']"); // 미납액 필드
    let $paymentDay = $row.find("input[name='paymentDay']"); // 납부일 필드
 	
    let $calulate = $row.find("input[name='calculate']");
    let tempPrice = $price.val();  // 기존 납부액 임시 저장
    let tempNoPrice = $noPrice.val();  // 기존 미납액 임시 저장
    
    let tempShWidthmmOrg 	= 1000;
    let tempPriceOrg 		= 1000;
    
    let today = new Date();
    let formattedDate = today.getFullYear() + "-" + 
                        String(today.getMonth() + 1).padStart(2, '0') + "-" + 
                        String(today.getDate()).padStart(2, '0');
	//alert(paymentGubun+"/"+tempNoPrice+":"+tempPriceOrg+" / "+tempPrice);
    if (paymentGubun === "0408") { // ✅ 미납 → 완납
        $price.val(tempNoPrice==0?tempPriceOrg:tempNoPrice);  // 납부액 = 기존 미납액
        $noPrice.val(0);  // 미납액 = 기존 납부액
        $paymentDay.val(formattedDate);  // 납부일 = 오늘 날짜
    } else if (paymentGubun === "0402") { // ✅ 완납 → 미납
        $price.val(0);  // 납부액 = 기존 미납액
        $noPrice.val(tempPrice==0?tempPriceOrg:tempPrice);  // 미납액 = 기존 납부액
        $paymentDay.val("");  // 납부일 초기화
    }
    
    $calulate.val(tempShWidthmmOrg);
}

// 수납 금액 관련 계산 - jQuery 사용
function calculateTotals() {
    let totalAmount = 0; // 총 수납 금액
    let paidAmount = 0; // 총 납부액
    let unpaidAmount = 0; // 총 미납액
    let refundAmount = 0; // 총 환불액

    $('.table_write tr').each(function () {
        let price = $(this).find('input[name="price"]').val();
        let noPrice = $(this).find('input[name="noPrice"]').val();
        let paymentGubun = $(this).find('select[name="paymentGubun"]').val();

        // 숫자형으로 변환하고 비어있으면 0으로 처리
        price = parseInt(price ? price.replace(/,/g, '') : '0', 10);
        noPrice = parseInt(noPrice ? noPrice.replace(/,/g, '') : '0', 10);

        totalAmount += price || 0;
        unpaidAmount += noPrice || 0;

        if (paymentGubun === '0403') {
            refundAmount += price || 0;
        } else {
            paidAmount += price || 0;
        }
    });

    // 합계 결과를 화면에 출력
    $('#totalAmount').text(totalAmount.toLocaleString() + '원');
    $('#paidAmount').text(paidAmount.toLocaleString() + '원');
    $('#unpaidAmount').text(unpaidAmount.toLocaleString() + '원');
    $('#refundAmount').text(refundAmount.toLocaleString() + '원');
}

//처리할 AJAX 요청 개수와 완료된 요청 개수를 추적
let totalRequests = 0;  // 총 요청 개수
let completedRequests = 0;  // 완료된 요청 개수
let hasError = false;  // 오류 여부 추적

/**
 * ✅ 등록 요청을 시작하는 함수
 */
function submitFormData() {
    let rows = $(".table_write tr[data-item='true']");
    
    // ✅ 환불(REFUND)이 포함된 경우, 완납(FULL_PAYMENT)은 제외
    /* let hasRefund = rows.filter(function(_, row) {
        return $(row).find("select[name='paymentGubun']").val() === '0403';
    }).length > 0;
    
    if (hasRefund) {
        rows = rows.filter(function(_, row) {
            return $(row).find("select[name='paymentGubun']").val() !== '0408';
        });
    } */

    totalRequests = rows.length;
    completedRequests = 0;
    hasError = false;

    console.log("🚀 submitFormData() 시작 | totalRequests: " + totalRequests);

    if (totalRequests === 0) {
        alert("등록할 데이터가 없습니다.");
        return;
    }

    processNextRow(0, rows); // 첫 번째 행부터 처리 시작
}

/**
 * ✅ 한 행씩 처리하는 함수
 * @param {number} index - 현재 처리할 행의 인덱스
 * @param {Array} rows - 처리해야 할 행 목록
 */
function processNextRow(index, rows) {
    // ✅ 모든 행이 처리된 경우 완료 체크
    if (index >= rows.length) {
        checkCompleted();
        return;
    }

    var $row = $(rows[index]);
    var receiptCode = $row.find("select[name='receiptCode']").val();

    console.log("🔄 처리 중: " + index + " | receiptCode: " + receiptCode);

    if (receiptCode !== "") {
        var frmData = new FormData();
        frmData.append("studentNo", "2028000548");
        frmData.append("paymentMonth", $row.data("paymentmonth"));
        frmData.append("idx", $row.data("idx"));
        frmData.append("receiptCode", receiptCode);
        frmData.append("price", $row.find("input[name='price']").val());
        frmData.append("noPrice", $row.find("input[name='noPrice']").val());
        frmData.append("paymentDay", $row.find("input[name='paymentDay']").val());
        frmData.append("paymentGubun", $row.find("select[name='paymentGubun']").val());
        frmData.append("priceGubun", $row.find("select[name='priceGubun']").val());
        frmData.append("bigo", $row.find("input[name='bigo']").val());
        frmData.append("freeNabbu", $row.find("input[name='freeNabbu']").is(":checked") ? 'Y' : 'N');
        frmData.append("freeNabbuStandard", $row.find("input[name='freeNabbuStandard']").val());
        frmData.append("freeNabbuPrice", $row.find("input[name='freeNabbuPrice']").val());
        frmData.append("calculate", $row.find("input[name='calculate']").val());

        console.log("📡 [" + index + "] AJAX 요청 전송...");

        callAjaxSequential("/wkwhrma/excute/insertAcademyPriceInput", frmData, function(data) {
            completeInsertAcademyPriceInput(index, rows, data);
        });
    } else {
        console.log("⏭️ " + index + "번 행 건너뜀 (receiptCode 없음)");
        completedRequests++;
        processNextRow(index + 1, rows);  // 다음 행 처리
    }
}

/**
 * ✅ AJAX 응답 완료 후 다음 행 실행하는 함수
 * @param {number} index - 현재 처리한 행의 인덱스
 * @param {Array} rows - 처리해야 할 행 목록
 * @param {object|null} data - 서버 응답 데이터 (null일 수 있음)
 */
function completeInsertAcademyPriceInput(index, rows, data) {
    console.log("✔️ [" + index + "] 응답 수신", data);

    // ✅ data가 undefined 또는 null일 경우 안전하게 처리
    if (!data || typeof data.resultcode === "undefined") {
        console.error("❌ [" + index + "] 응답 데이터가 없음 또는 잘못된 형식", data);
        hasError = true;
        completedRequests++;
        processNextRow(index + 1, rows);
        return;
    }

    switch (data.resultcode) {
        case 200:
            if ($("#sendSms").is(":checked")) {
                sendMessageToMember();
            }
            break;
        case 0:
            alertMessage("처리에 실패했습니다.");
            hasError = true;
            break;
        default:
            alertMessage(data.message);
            hasError = true;
            break;
    }

    completedRequests++; // 완료된 요청 개수 증가
    processNextRow(index + 1, rows); // ✅ 다음 행 처리
}

/**
 * ✅ 모든 요청이 완료되었는지 확인하는 함수
 */
function checkCompleted() {
    console.log("🔎 checkCompleted() 호출됨 | completedRequests: " + completedRequests + " / totalRequests: " + totalRequests);
    
    if (completedRequests === totalRequests) {
        if (!hasError) {
            completeInsert();
        } else {
            alertMessage("일부 요청 처리 중 오류가 발생했습니다.");
        }
    }
}

/**
 * ✅ 모든 처리가 완료되었을 때 실행
 */
function completeInsert() {
    alertMessage("정상 처리되었습니다.");
    opener.location.reload();
    self.close();
}
