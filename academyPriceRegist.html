    <script type="text/javascript">
        function getQueryParam(name) {
            try {
                const params = new URLSearchParams(window.location.search);
                const v = params.get(name);
                return v !== null ? String(v) : "";
            } catch (e) {
                return "";
            }
        }

        function setFieldValue(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            el.value = value == null ? "" : String(value);
        }

        function setEnabled(id, enabled) {
            const el = document.getElementById(id);
            if (!el) return;
            el.disabled = !enabled;
        }

        window.addEventListener("DOMContentLoaded", function () {
            // 팝업을 여는 쪽(Statistics2)에서 쿼리로 전달
            const itemName = getQueryParam("itemName");
            const budgetAmount = getQueryParam("budgetAllocAmount");
            const balance = getQueryParam("balance");
            const note = getQueryParam("note");
            const yearText = getQueryParam("year");
            const showBalance = getQueryParam("showBalance");

            setFieldValue("pItemName", itemName);
            setFieldValue("pBudgetAmount", budgetAmount);
            setFieldValue("pBalance", balance);
            setFieldValue("pNote", note);
            if (yearText) setFieldValue("pYear", yearText);

            // 기본은 수정 불가
            setEnabled("pBudgetAmount", false);
            setEnabled("pNote", false);
            // 잔액은 항상 수정 불가
            setEnabled("pBalance", false);
            // 항목명/해당년도도 항상 수정 불가
            setEnabled("pItemName", false);
            setEnabled("pYear", false);

            const isRegisterMode = showBalance === "0";

            // showBalance=0이면 잔액 행만 숨김(예산배정등록 팝업 모드)
            if (showBalance === "0") {
                const rowBalance = document.getElementById("rowBalance");
                if (rowBalance) rowBalance.style.display = "none";
            }

            const registerBtn = document.getElementById("registerBtn");
            const editBtn = document.getElementById("editBtn");
            const deleteBtn = document.getElementById("deleteBtn");

            const titleEl = document.getElementById("popupTitle");
            if (titleEl) {
                titleEl.textContent = isRegisterMode ? "예산배정 등록" : "예산배정 정보";
            }

            if (isRegisterMode) {
                // 예산배정등록 팝업: 해당년도/항목명/예산배정액/비고 전부 수정 가능
                setEnabled("pYear", true);
                setEnabled("pItemName", true);
                setEnabled("pBudgetAmount", true);
                setEnabled("pNote", true);

                if (registerBtn) registerBtn.style.display = "";
                if (editBtn) editBtn.style.display = "none";
                if (deleteBtn) deleteBtn.style.display = "none";

                // 등록: 현재 UI 목적에 맞게 저장 대신 opener 새로고침/닫기만 수행
                if (registerBtn) {
                    registerBtn.addEventListener("click", function (e) {
                        e.preventDefault();
                        try {
                            if (window.opener) window.opener.location.reload();
                        } catch (err) {}
                        try {
                            self.close();
                        } catch (err) {}
                    });
                }
            } else {
                // 예산배정 정보: 열자마자 해당년도·항목명·예산배정액·비고 수정 가능
                if (registerBtn) registerBtn.style.display = "none";
                if (editBtn) editBtn.style.display = "";
                if (deleteBtn) deleteBtn.style.display = "";

                setEnabled("pYear", true);
                setEnabled("pItemName", true);
                setEnabled("pBudgetAmount", true);
                setEnabled("pNote", true);
            }

            if (editBtn) {
                editBtn.addEventListener("click", function (e) {
                    e.preventDefault();
                    if (isRegisterMode) return;
                    try {
                        if (window.opener) window.opener.location.reload();
                    } catch (err) {}
                    try {
                        self.close();
                    } catch (err) {}
                });
            }

            if (!isRegisterMode && deleteBtn) {
                deleteBtn.addEventListener("click", function (e) {
                    e.preventDefault();
                    const ok = window.confirm("정말 삭제하시겠습니까?");
                    if (!ok) return;
                    try {
                        if (window.opener) window.opener.location.reload();
                    } catch (err) {}
                    try {
                        self.close();
                    } catch (err) {}
                });
            }
        });
    </script>
