						.matrix-actions { display:flex; flex-direction:column; gap: 6px; align-items:flex-end; }
						.matrix-btn { border-radius: 4px; padding: 4px 10px; font-size: 11px; font-weight: 900; cursor:pointer; border: 1px solid #cfe0f3; background:#f8fbff; color:#2b6cb0; }

				injectStyles();
				hideTreeUI();

				// insert matrix root
				var popCon = document.querySelector(".popCon") || document.body;
				var old = document.getElementById("matrixRoot");
				if (old) old.remove();
				var root = document.createElement("div");
				root.id = "matrixRoot";
				root.className = "matrix-root";
				root.innerHTML = `
					<div class="matrix-grid">
						<div class="matrix-col">
							<div class="matrix-col-hd">
								<div class="matrix-col-title">구분1</div>
								<button class="matrix-add" data-add-depth="1">+ 추가</button>
							</div>
							<div class="matrix-col-bd" data-col-depth="1"></div>
						</div>
						<div class="matrix-col">
							<div class="matrix-col-hd">
								<div class="matrix-col-title">구분2</div>
								<button class="matrix-add" data-add-depth="2">+ 추가</button>
							</div>
							<div class="matrix-col-bd" data-col-depth="2"></div>
						</div>
						<div class="matrix-col">
							<div class="matrix-col-hd">
								<div class="matrix-col-title">구분3</div>
								<button class="matrix-add" data-add-depth="3">+ 추가</button>
							</div>
							<div class="matrix-col-bd" data-col-depth="3"></div>
						</div>
						<div class="matrix-col">
							<div class="matrix-col-hd">
								<div class="matrix-col-title">구분4</div>
								<button class="matrix-add" data-add-depth="4">+ 추가</button>
							</div>
							<div class="matrix-col-bd" data-col-depth="4"></div>
						</div>
					</div>
					<div class="matrix-bottom-hint">사용/미사용은 저장 시 미사용(미선택) 항목을 제외(삭제 처리)하도록 반영합니다.</div>
				`;
				popCon.insertBefore(root, popCon.firstChild);

				var matrixYear = getQueryYear() || currentYear;

				// CSV seed (HTML 내부 구현)
				var CSV_SEED_TEXT = `,,,
구분1,구분2,구분3,구분4
,,,
소비홍보,광고,품질향상,현수막 제작 및 게첨

수급안정,가격안정,수급조절사업,'25년산 가격안정 행사
,,,주산지 포도축제 행사
,,,포도데이 행사 등
,,,과일산업대전 행사

,수급안정 예비비,수급안정 예비비,농업수입안정보험 등 지원사업(보류)
경쟁력제고,품질향상,교육자료 발간 등,재배기술 책자 발간 등
,,,영상자료 링크
,,,담당자 교육
,생산성향상,샤인머스켓 이외 품종 삽목묘 구입비 지원,삽목묘 구입비 지원
교육 및 정보제공,교육,거출률광고,버스외부광고
,,사무국 주관 농가교육,사무국 주관 교육
,,회원농협 주관 농가교육,회원농협 주관 교육
,정보제공,거출금 고지 등,거출금 고지
,,,문자 발송
,,,영농일지 등 제작
,,홈페이지 관리?운영 등,수납관리시스템관리
,,,홈페이지유지관리
,,,인스타그램 운영
수납위탁 수수료,수납기관 수수료,수납지원,수납기관 수수료(가상계좌)
운영관리,인건비,급여 및 퇴직연금,급여 및 퇴직연금
,,법정부담금,법정부담금(4대보험)
,경비,대의원회,임차료
,,,"참석수당(대면, 서면)",임차료
,,,인쇄비 등
,,,기타(참석자 식대 등)
,,"회의비(이사회, 관리위원회 등)",임차료
,,,"참석수당(대면, 서면)"
,,,인쇄비 등
,,,기타(참석자 식대 등)
,,수용비,사무국 운영비 등
,,,의무자조금단체 연회비
,,,해직자 고발 건 대응 노무사비 등
,,제수수료,"외부회계감사, 세무기장료, 등기 등"
,,업무추진비,업무추진비

,,임차료,"임차료(사무실 임차료, 렌터카 등)"

				function parseCsv4(text) {
					var rows = [];
					var row = [];
					var field = "";
					var inQuotes = false;
					for (var i = 0; i < text.length; i++) {
						var ch = text[i];
						if (ch === '\"') {
							if (inQuotes && text[i + 1] === '\"') {
								field += '\"';
								i++;
							} else {
								inQuotes = !inQuotes;
							}
							continue;
						}
						if (ch === "," && !inQuotes) {
							row.push(field);
							field = "";
							continue;
						}
						if ((ch === "\n" || ch === "\r") && !inQuotes) {
							if (ch === "\r" && text[i + 1] === "\n") i++;
							row.push(field);
							field = "";
							while (row.length < 4) row.push("");
							rows.push(row.slice(0, 4));
							row = [];
							continue;
						}
						field += ch;
					}
					if (field.length || row.length) {
						row.push(field);
						while (row.length < 4) row.push("");
						rows.push(row.slice(0, 4));
					}
					return rows;
				}

				function buildItemsFromSeedCsv4() {
					var rows = parseCsv4(CSV_SEED_TEXT);
					var current = ["", "", "", ""];
					var mapKey = {};
					var childrenCount = {};
					var items = {};

					function getId(depth, parentId, name) {
						if (!name) return null;
						var key = depth + "|" + parentId + "|" + name;
						if (mapKey[key]) return mapKey[key];
						var ck = depth + "|" + parentId;
						var idx = (childrenCount[ck] || 0) + 1;
						childrenCount[ck] = idx;
						var id = depth === 1 ? String(idx) : parentId + "-" + String(idx);

						for (var d0 = 0; d0 < 4; d0++) {

						if (deepest === 0) continue;

							}

						var parent = "";
						for (var d2 = 1; d2 <= deepest; d2++) {

						if (ds.has(id)) return;
						if (depthFromId(id) !== depth) return;
						if (parentIdFromBudgetId(id) !== (parentId || "")) return;
						out.push({ id: id, item: items[id] });

					Object.keys(items).forEach(function (id) {
						if (ds.has(id)) return;
						if (depthFromId(id) !== depth) return;
						if (parentIdFromBudgetId(id) !== (parentId || "")) return;
						var last = String(id).split("-").slice(-1)[0];
						var n = parseInt(last, 10);
						if (!isNaN(n)) max = Math.max(max, n);

					return String(max + 1);

						note: it && it.note != null ? String(it.note) : ""

				var y = String(new Date().getFullYear());
				localStorage.setItem(
					STORAGE_KEY,
					JSON.stringify({
						years: (function () {
							var o = {};

			var tbody = document.getElementById("itemTbody");
			var rows = Array.from(tbody.querySelectorAll("tr:not([data-hidden='1'])"));
			var c = [0, 0, 0, 0];
			var pd = 0;
			rows.forEach(function (tr) {
				var d = getDepthFromTr(tr);
				tr.setAttribute("data-depth", String(d));
				if (d > pd) {
					c[d - 1] = (c[d - 1] || 0) + 1;
					for (var i = d; i < 4; i++) c[i] = 0;
				} else if (d === pd) {
					c[d - 1]++;
				} else {
					for (var j = d; j < 4; j++) c[j] = 0;
					c[d - 1]++;
				}
				pd = d;
				var parts = [];
				for (var k = 0; k < d; k++) parts.push(c[k]);
				var newId = parts.join("-");
				tr.setAttribute("data-budget-id", newId);
				var noIn = tr.querySelector(".td-no-inline");
				if (noIn) noIn.textContent = newId;

				ref = block[i];

				"포도데이 행사 등",
				"과일산업대전 행사",
				"연말 수급조절 행사",
				"판촉홍보물 제작 등",
				"수급안정 예비비",
				"농업수입안정보험 등 지원사업(보류)"
			];
		}

		function buildNameOptions(items) {
			var set = new Set();
			defaultSeedNames().forEach(function (n) {
				if (n) set.add(n);
			});
			Object.keys(items || {}).forEach(function (id) {
				var it = items[id];
				var n = it && it.name != null ? String(it.name).trim() : "";
				if (n) set.add(n);
			});
			return Array.from(set).sort(function (a, b) {
				return a.localeCompare(b, "ko");
			});
		}

		function nameSelectHtml(name, nameOptions) {
			var cur = String(name == null ? "" : name).trim();
			var opts = (nameOptions || []).slice();
			if (cur && opts.indexOf(cur) === -1) opts.push(cur);
			opts.sort(function (a, b) {
				return a.localeCompare(b, "ko");
			});
			var html = '<select class="inp-name">';
			html += '<option value=""></option>';
			opts.forEach(function (opt) {
				var esc = escapeHtml(opt);
				html += '<option value="' + esc + '"' + (opt === cur ? " selected" : "") + ">" + esc + "</option>";
			});
			html += "</select>";
			return html;
		}

		function nameTdHtml(budgetNo, name, opts, depth) {
			opts = opts || {};
			depth = Math.min(4, Math.max(1, parseInt(depth, 10) || 1));
			var glyph =
				depth >= 2
					? '<span class="tree-glyph" aria-hidden="true">ㄴ</span>'
					: '<span class="tree-glyph tree-glyph--root" aria-hidden="true"></span>';
			var inner =
				glyph +
				'<span class="td-no-inline">' +
				escapeHtml(budgetNo) +
				"</span>" +
				nameSelectHtml(name, opts.nameOptions != null ? opts.nameOptions : cachedNameOptions);
			var slots = "";
			var i;
			for (i = 1; i < depth; i++) {
				slots += '<div class="nc nc-empty"></div>';
			}
			slots +=
				'<div class="nc nc-main" style="grid-column: ' +
				depth +
				' / -1">' +
				inner +
				"</div>";
			return '<td class="td-name"><div class="name-five-cols">' + slots + "</div></td>";
		}

		function dragTdHtml() {
			return (
				'<td class="td-drag"><span class="row-drag-handle" title="같은 뎁스·같은 상위 안에서 순서 변경">⋮</span></td>'
			);
		}

		function rowInnerFromValues(d, id, name, alloc, note) {
			return (
				depthTdPlusOnly() +
				nameTdHtml(id, name, {}, d) +
				'<td class="td-amt"><input type="text" class="inp-amt" value="' +
				escapeHtml(alloc) +
				'" /></td>' +
				'<td class="td-note"><input type="text" class="inp-note" value="' +
				escapeHtml(formatNoteDisplay(note)) +
				'" /></td>' +
				'<td class="td-act"><button type="button" class="btn-del">삭제</button></td>' +
				dragTdHtml()
			);
		}

		function bindDel(btn) {
			btn.addEventListener("click", function () {
				onDeleteClick(btn.closest("tr"));
			});
		}

		function childIdsOf(parentId) {
			var out = [];
			document.querySelectorAll("#itemTbody tr").forEach(function (tr) {
				var id = getRowBudgetId(tr);
				if (!id) return;
				if (id !== parentId && id.indexOf(parentId + "-") === 0) out.push(id);
			});
			return out;
		}

		function onDeleteClick(tr) {
			var id = getRowBudgetId(tr);
			var temp = tr.getAttribute("data-temp-new") === "1";
			if (temp || !id) {
				tr.parentNode.removeChild(tr);
				renumberVisibleRows();
				return;
			}
			var toHide = [id].concat(childIdsOf(id));
			var d = getDepthFromTr(tr);
			var msg;
			if (d === 2 && toHide.length > 1) {
				msg =
					"2뎁스 항목을 삭제하면 하위에 속한 모든 뎁스의 항목이 함께 삭제됩니다. 계속할까요?";
			} else if (toHide.length > 1) {
				msg = "선택한 항목 및 하위 " + (toHide.length - 1) + "건을 삭제할까요?";
			} else {
				msg = "선택한 항목을 삭제할까요?";
			}
			if (!confirm(msg)) return;
			toHide.forEach(function (hid) {
				pendingDeleted.add(hid);
				document.querySelectorAll("#itemTbody tr").forEach(function (r) {
					if (getRowBudgetId(r) === hid) {
						r.setAttribute("data-hidden", "1");
					}
				});
			});
			renumberVisibleRows();
		}

		function wireDragHandle(tr) {
			var h = tr.querySelector(".row-drag-handle");
			if (!h) return;
			h.setAttribute("draggable", "true");
			h.addEventListener("dragstart", function (e) {
				dragBlock = getSubtreeRowsForDrag(tr);
				dragRow = dragBlock[0];
				foldedRows = dragBlock.slice(1);
				foldedRows.forEach(function (r) {
					r.classList.add("budget-drag-folded");
				});
				dragRow.classList.add("budget-row-dragging");
				e.dataTransfer.setData("text/plain", "row");
				e.dataTransfer.effectAllowed = "move";
				e.stopPropagation();
			});
			h.addEventListener("dragend", function () {
				tr.classList.remove("budget-row-dragging");
				foldedRows.forEach(function (r) {
					r.classList.remove("budget-drag-folded");
				});
				foldedRows = [];
				dragBlock = null;
				dragRow = null;
			});
		}

		function initTbodyDrag() {
			var tbody = document.getElementById("itemTbody");
			tbody.addEventListener("dragover", function (e) {
				e.preventDefault();
				var target = e.target && e.target.closest ? e.target.closest("tr") : null;
				if (!target || !target.parentNode || target.parentNode !== tbody) return;
				if (target.getAttribute("data-hidden") === "1") return;
				if (!dragRow || !dragBlock || !dragBlock.length) return;
				if (dragBlock.indexOf(target) >= 0 && target !== dragRow) return;
				if (target === dragRow) return;
				if (!isSameSiblingGroup(dragRow, target)) {
					e.dataTransfer.dropEffect = "none";
					return;
				}
				e.dataTransfer.dropEffect = "move";
				var tSub = getSubtreeRowsForDrag(target);
				var tFirst = tSub[0];
				var tLast = tSub[tSub.length - 1];
				var rect = target.getBoundingClientRect();
				var after = e.clientY > rect.top + rect.height / 2;
				if (after) moveBlockAfter(dragBlock, tLast);
				else moveBlockBefore(dragBlock, tFirst);
				renumberVisibleRows();
			});
			tbody.addEventListener("drop", function (e) {
				e.preventDefault();
			});
		}

		function findLastRowInSubtree(parentId) {
			var rows = Array.from(document.querySelectorAll("#itemTbody tr"));
			var last = null;
			rows.forEach(function (tr) {
				if (tr.getAttribute("data-hidden") === "1") return;
				var id = getRowBudgetId(tr);
				if (!id) return;
				if (id === parentId || id.indexOf(parentId + "-") === 0) last = tr;
			});
			return last;
		}

		function addChildUnderRow(anchorTr) {
			var parentId = getRowBudgetId(anchorTr);
			if (!parentId) {
				alert("번호를 확인할 수 없습니다. 잠시 후 다시 시도하세요.");
				return;
			}
			var d = getDepthFromTr(anchorTr);
			if (d >= 4) {
				alert("4뎁스가 최하위입니다. 더 아래 단계는 추가할 수 없습니다.");
				return;
			}
			addSeq += 1;
			var tr = document.createElement("tr");
			tr.setAttribute("data-added", "1");
			tr.setAttribute("data-temp-new", "1");
			tr.setAttribute("data-depth", String(d + 1));
			tr.innerHTML =
				depthTdPlusOnly() +
				nameTdHtml("…", "", { placeholder: "항목명" }, d + 1) +
				'<td class="td-amt"><input type="text" class="inp-amt" placeholder="0" value="" /></td>' +
				'<td class="td-note"><input type="text" class="inp-note" value="" /></td>' +
				'<td class="td-act"><button type="button" class="btn-del">삭제</button></td>' +
				dragTdHtml();
			var ins = findLastRowInSubtree(parentId);
			if (ins) ins.after(tr);
			else document.getElementById("itemTbody").appendChild(tr);
			bindDel(tr.querySelector(".btn-del"));
			wireDragHandle(tr);
			tr.removeAttribute("data-temp-new");
			renumberVisibleRows();
			var nm = tr.querySelector(".inp-name");
			if (nm) nm.focus();
		}

		function addEmptyRow() {
			addSeq += 1;
			var tr = document.createElement("tr");
			tr.setAttribute("data-added", "1");
			tr.setAttribute("data-temp-new", "1");
			tr.setAttribute("data-depth", "1");
			tr.innerHTML =
				depthTdPlusOnly() +
				nameTdHtml("…", "", { placeholder: "항목명" }, 1) +
				'<td class="td-amt"><input type="text" class="inp-amt" placeholder="0" value="" /></td>' +
				'<td class="td-note"><input type="text" class="inp-note" value="" /></td>' +
				'<td class="td-act"><button type="button" class="btn-del">삭제</button></td>' +
				dragTdHtml();
			document.getElementById("itemTbody").appendChild(tr);
			bindDel(tr.querySelector(".btn-del"));
			wireDragHandle(tr);
			tr.removeAttribute("data-temp-new");
			renumberVisibleRows();
			tr.querySelector(".inp-name").focus();
		}

		document.getElementById("itemTbody").addEventListener("click", function (e) {
			var btn = e.target && e.target.closest && e.target.closest(".btn-add-child");
			if (!btn) return;
			var row = btn.closest("tr");
			if (!row) return;
			e.preventDefault();
			addChildUnderRow(row);
		});

		/* 기본 행: [depth, id, name, alloc, note?] */
		function buildDefaultTbodyHtml() {
			var rows = [
				[1, "1", "수급안정", "100,000"],
				[2, "1-1", "가격안정", "—"],
				[3, "1-1-1", "수급조절사업", "—"],
				[4, "1-1-1-1", "25년산 가격안정 행사", "—"],
				[4, "1-1-1-2", "주산지 포도축제 행사", "—"],
				[4, "1-1-1-3", "포도데이 행사 등", "—"],
				[4, "1-1-1-4", "과일산업대전 행사", "—"],
				[4, "1-1-1-5", "연말 수급조절 행사", "—"],
				[4, "1-1-1-6", "판촉홍보물 제작 등", "—"],
				[2, "1-2", "수급안정 예비비", "—"],
				[3, "1-2-1", "수급안정 예비비", "—"],
				[4, "1-2-1-1", "농업수입안정보험 등 지원사업(보류)", "—"]
			];
			return rows
				.map(function (r) {
					var tr =
						'<tr data-budget-id="' +
						r[1] +
						'" data-depth="' +
						r[0] +
						'">' +
						rowInnerFromValues(r[0], r[1], r[2], r[3], r[4]) +
						"</tr>";
					return tr;
				})
				.join("");
		}

		function applyItemsToDom(items, deleted) {
			cachedNameOptions = buildNameOptions(items);
			var tbody = document.getElementById("itemTbody");
			tbody.innerHTML = buildDefaultTbodyHtml();
			Object.keys(items || {}).forEach(function (id) {
				var it = items[id];
				var tr = tbody.querySelector('tr[data-budget-id="' + id + '"]');
				if (!tr) return;
				var n = tr.querySelector(".inp-name");
				var a = tr.querySelector(".inp-amt");
				var noteInp = tr.querySelector(".inp-note");
				if (n && it.name != null) n.value = it.name;
				if (a) {
					var rawA = it.alloc != null ? it.alloc : it.amount;
					a.value = formatAllocDisplay(rawA != null ? rawA : "");
				}
				if (noteInp) noteInp.value = formatNoteDisplay(it.note);
			});
			(deleted || []).forEach(function (id) {
				pendingDeleted.add(id);
				var tr = tbody.querySelector('tr[data-budget-id="' + id + '"]');
				if (tr) tr.setAttribute("data-hidden", "1");
			});
			tbody.querySelectorAll("tr").forEach(function (tr) {
				bindDel(tr.querySelector(".btn-del"));
				wireDragHandle(tr);
			});
		}

		function syncExtraFromItems(items, deleted) {
			var tbody = document.getElementById("itemTbody");
			var have = {};
			tbody.querySelectorAll("tr[data-budget-id]").forEach(function (tr) {
				var id = tr.getAttribute("data-budget-id");
				if (id) have[id] = true;
			});
			Object.keys(items || {}).forEach(function (id) {
				if ((deleted || []).indexOf(id) !== -1 || have[id]) return;
				var it = items[id];
				var d = depthFromId(id);
				var tr = document.createElement("tr");
				tr.setAttribute("data-added", "1");
				tr.setAttribute("data-budget-id", id);
				tr.setAttribute("data-depth", String(d));
				tr.innerHTML =
					depthTdPlusOnly() +
					nameTdHtml(id, (it && it.name) || "", {}, d) +
					'<td class="td-amt"><input type="text" class="inp-amt" value="' +
					escapeHtml(formatAllocDisplay((it && it.alloc) != null ? it.alloc : (it && it.amount) || "")) +
					'" /></td>' +
					'<td class="td-note"><input type="text" class="inp-note" value="' +
					escapeHtml(formatNoteDisplay(it && it.note)) +
					'" /></td>' +
					'<td class="td-act"><button type="button" class="btn-del">삭제</button></td>' +
					dragTdHtml();
				tbody.appendChild(tr);
				bindDel(tr.querySelector(".btn-del"));
				wireDragHandle(tr);
			});
		}

		function loadYear(year) {
			currentYear = year;
			pendingDeleted = new Set();
			seed2025IfEmpty();
			var payload = getYearPayload(year);
			var items = payload.items || {};
			var deleted = payload.deleted || [];
			deleted.forEach(function (id) {
				pendingDeleted.add(id);
			});
			applyItemsToDom(items, deleted);
			syncExtraFromItems(items, deleted);
			reorderTbodyBySavedOrder(payload.order);
			formatAllAllocInputs();
		}

		function resolveEffectiveYear() {
			var yq = getQueryYear();
			if (yq) return yq;
			var root = readRoot();
			var years = root.years || {};
			var best = null;
			var bestCount = -1;
			Object.keys(years).forEach(function (y) {
				var c = Object.keys((years[y] && years[y].items) || {}).length;
				if (c > bestCount) {
					bestCount = c;
					best = y;
				}
			});
			if (best) return best;
			return String(new Date().getFullYear());
		}

		document.getElementById("btnSave").addEventListener("click", function (e) {
			e.preventDefault();
			renumberVisibleRows();
			var items = {};
			var order = [];
			var seen = {};
			var saveAborted = false;
			document.querySelectorAll("#itemTbody tr").forEach(function (tr) {
				if (tr.getAttribute("data-hidden") === "1") return;
				var id = getRowBudgetId(tr);
				if (!id) {
					saveAborted = true;
					return;
				}
				if (seen[id]) {
					alert("번호가 중복되었습니다: " + id);
					saveAborted = true;
					return;
				}
				seen[id] = true;
				order.push(id);
				var n = tr.querySelector(".inp-name");
				var a = tr.querySelector(".inp-amt");
				var noteInp = tr.querySelector(".inp-note");
				items[id] = {
					name: n ? n.value.trim() : "",
					alloc: a ? stripAllocForSave(a.value) : "",
					spent: "",
					note: noteInp ? noteInp.value.trim() : ""
				};
			});
			if (saveAborted) {
				alert("항목을 확인해 주세요.");
				return;
			}
			var deleted = Array.from(pendingDeleted);
			try {
				setYearPayload(currentYear, { items: items, deleted: deleted, order: order });
			} catch (e) {
				alert("저장에 실패했습니다.");
				return;
			}
			if (window.opener && typeof window.opener.applyBudgetTreeFromStorage === "function") {
				window.opener.applyBudgetTreeFromStorage();
			}
			alert("저장되었습니다.");
			if (!embedMode) {
				window.close();
			} else {
				// iframe/tab 모드: 닫지 말고 부모 화면만 가볍게 새로고침
				try {
					if (window.parent) window.parent.location.reload();
				} catch (e) {}
			}
		});

		// 닫기: popup(기존 동작) vs iframe(embed=1) 분기
		var btnClose = document.getElementById("btnClose");
		if (btnClose) {
			btnClose.addEventListener("click", function (e) {
				e.preventDefault();
				if (!embedMode) {
					try {
						self.close();
					} catch (err) {}
				} else {
					try {
						if (window.parent) window.parent.location.reload();
					} catch (err) {}
				}
			});
		}

		migrateV1ToV2();
		seed2025IfEmpty();
		currentYear = resolveEffectiveYear();
		wireAllocCommaInputs();
		loadYear(currentYear);
		initTbodyDrag();
	})();
	</script>
