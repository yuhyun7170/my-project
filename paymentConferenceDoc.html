<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>지급회의서</title>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
	<link href="https://자조금.kr/css/common.css?ver=1.0.2" rel="stylesheet" type="text/css" />
	<link href="https://자조금.kr/css/premium.css?ver=1.0.3" rel="stylesheet" type="text/css" />
	<link href="https://자조금.kr/css/menu.css?ver=1.0.5" rel="stylesheet" type="text/css" />
	<link href="https://자조금.kr/css/alert.css?ver=1.0.0" rel="stylesheet" type="text/css" />
	<style>
		* { box-sizing: border-box; }
		/* common.css 등에서 html/body 높이 100% 시 팝업 하단이 회색으로 길게 남는 현상 방지 */
		html {
			height: auto !important;
			min-height: 0 !important;
		}
		body.pc-body {
			margin: 0;
			min-height: 0 !important;
			height: auto !important;
			padding: 12px 16px 6px;
			font-size: 13px;
			color: #222;
			background: #ffffff;
			overflow-x: auto;
		}
		.pc-shell {
			max-width: 1120px;
			margin: 0 auto;
			background: #fff;
			border: 1px solid #dedede;
			padding: 0;
		}
		.pc-head {
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
			padding: 12px 44px 10px;
			
			background: #f3f3f3;
		}
		.pc-head h1 {
			margin: 0;
			font-size: 18px;
			font-weight: 700;
			letter-spacing: 0.06em;
		}
		.pc-head .pc-head-close {
			position: absolute;
			right: 8px;
			top: 50%;
			transform: translateY(-50%);
		}
		.pc-form-wrap {
			padding: 0;
		}
		table.pc-form-table {
			width: 100%;
			border-collapse: collapse;
			table-layout: fixed;
			font-size: 13px;
			border: none;
			border-bottom: 1px solid #dedede;
		}
		table.pc-form-table > tbody > tr > th {
			text-align: center;
			font-weight: 600;
			background: #f3f3f3;
			border: 1px solid #dedede;
			padding: 6px 8px;
			vertical-align: middle;
		}
		table.pc-form-table > tbody > tr > td {
			border: 1px solid #dedede;
			padding: 4px 6px;
			background: #fff;
			vertical-align: middle;
		}
		table.pc-form-table input[type="text"],
		table.pc-form-table input[type="date"],
		table.pc-form-table select,
		table.pc-form-table textarea {
			width: 100%;
			max-width: 100%;
			padding: 4px 6px;
			border: 1px solid #999;
			font-size: 13px;
			background: #fff;
		}
		table.pc-form-table select { min-height: 28px; }
		table.pc-form-table select:disabled {
			background: #eee;
			color: #888;
		}
		.pc-year-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
		.pc-year-row select#pcYear { width: auto; min-width: 80px; }
		.pc-static-td { text-align: center; font-size: 13px; padding: 10px 8px !important; }
		td.pc-evidence-outer {
			padding: 0 !important;
			vertical-align: top !important;
			background: #fff !important;
		}
		table.pc-evidence-inner {
			width: 100%;
			border-collapse: collapse;
			table-layout: fixed;
			font-size: 13px;
		}
		table.pc-evidence-inner th,
		table.pc-evidence-inner td {
			border: 1px solid #dedede;
		}
		table.pc-evidence-inner .pc-th-evidence-main {
			background: #f3f3f3;
			text-align: center;
			font-weight: 600;
			vertical-align: middle;
			line-height: 1.35;
			padding: 6px 4px !important;
		}
		table.pc-evidence-inner .pc-ev-sub {
			background: #f3f3f3;
			text-align: center;
			font-weight: 600;
			padding: 6px 8px !important;
			vertical-align: middle;
		}
		.pc-evidence-cell {
			vertical-align: top !important;
			padding: 6px 8px !important;
			background: #fff !important;
		}
		.pc-evidence-cell label {
			display: block;
			margin: 3px 0;
			cursor: pointer;
			font-weight: normal;
		}
		.pc-evidence-cell input[type="radio"] { margin-right: 6px; vertical-align: middle; }
		.btnBlue .fa, .btnRed .fa, .btnLink .fa-solid { margin-right: 0; }
		.pc-body-text {
			padding: 0;
			border: 1px solid #222;
			border-top: none;
		}
		.pc-body-text textarea {
			display: block;
			width: 100%;
			min-height: 140px;
			padding: 10px;
			border: none;
			font-size: 13px;
			resize: vertical;
		}
		.pc-body-text .pc-body-label {
			display: block;
			padding: 6px 10px 0;
			font-weight: 600;
			background: #f5f5f5;
			border-bottom: 1px solid #ddd;
		}
		.pc-file-row {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 12px;
			padding: 8px 12px;
			border: 1px solid #dedede;
			border-top: none;
			background: #ffffff;
		}
		.pc-file-row .pc-file-label {
			flex: 0 0 auto;
			padding-top: 4px;
		}
		.pc-file-col {
			flex: 1;
			min-width: 0;
			text-align: right;
		}
		.pc-file-addline {
			display: flex;
			align-items: center;
			justify-content: flex-end;
			gap: 8px;
			flex-wrap: wrap;
		}
		.pc-file-row input[type="file"] { display: none; }
		.pc-attach-hint {
			margin: 6px 0 0;
			font-size: 11px;
			color: #555;
			text-align: left;
			line-height: 1.35;
		}
		.pc-attach-list {
			margin: 8px 0 0;
			padding: 0;
			list-style: none;
			max-height: 160px;
			overflow: auto;
			text-align: left;
			border: 1px solid #ccc;
			background: #fff;
			border-radius: 4px;
		}
		.pc-attach-list li {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			padding: 5px 8px;
			font-size: 12px;
			border-bottom: 1px solid #eee;
		}
		.pc-attach-list li:last-child { border-bottom: none; }
		.pc-attach-list .pc-attach-name {
			flex: 1;
			min-width: 0;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}
		.pc-attach-actions {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			flex-shrink: 0;
		}
		.pc-attach-actions button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 28px;
			height: 28px;
			padding: 0;
			border: 1px solid #bbb;
			border-radius: 4px;
			background: #f8f8f8;
			cursor: pointer;
			color: #333;
		}
		.pc-attach-actions button:hover {
			background: #eaeaea;
		}
		.pc-attach-actions button:disabled {
			opacity: 0.45;
			cursor: not-allowed;
		}
		.pc-attach-actions button.pc-attach-remove {
			border-color: #c77;
			color: #922;
		}
		.pc-attach-actions button.pc-attach-remove:hover {
			background: #fde8e8;
		}
		.pc-actions-wrap {
			max-width: 1120px;
			margin: 10px auto 0;
			padding: 2px 12px 0;
			text-align: center;
			border: none;
			background: transparent;
		}
		.pc-actions-wrap .btnList.mt20 {
			margin-top: 8px;
			margin-bottom: 0;
		}
		.pc-actions-wrap .btnList {
			display: inline-flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: center;
			margin-bottom: 0;
		}
		.pc-actions-wrap .btnList li { list-style: none; }
		.pc-hint-bim {
			font-size: 11px;
			color: #856404;
			background: #fff3cd;
			padding: 8px 10px;
			border-bottom: 1px solid #222;
		}
	</style>
</head>
<body class="pc-body">
	<div class="pc-shell">
		<div class="pc-head">
			<h1>지급회의서</h1>
		</div>

		<form id="pcForm" action="javascript:void(0);" method="post">
			<div class="pc-form-wrap">
				<table class="pc-form-table">
					<colgroup>
						<col class="pc-col-1" style="width: 11%;" />
						<col class="pc-col-2" style="width: 22.33%;" />
						<col class="pc-col-3" style="width: 11%;" />
						<col class="pc-col-4" style="width: 22.33%;" />
						<col class="pc-col-5" style="width: 11%;" />
						<col class="pc-col-6" style="width: 22.34%;" />
					</colgroup>
					<tbody>
						<tr id="pcBimHintRow" style="display: none;">
							<td colspan="6" class="pc-hint-bim" id="pcBimHint">항목관리에 등록된 예산 항목이 없습니다. 「항목관리」에서 트리를 등록한 뒤 이용하세요.</td>
						</tr>
						<tr>
							<th scope="row">서기</th>
							<td>
								<div class="pc-year-row">
									<select id="pcYear" name="fiscalYear" aria-label="년도"></select>
									<span>년도</span>
								</div>
							</td>
							<th scope="row">결재자4</th>
							<td><select id="pcAppr4" name="approver4" class="pc-staff-sel"></select></td>
							<th scope="row">주소</th>
							<td><input type="text" name="address" id="pcAddr" autocomplete="off" /></td>
						</tr>
						<tr>
							<th scope="row">회계별</th>
							<td><input type="text" name="accountingType" id="pcAccounting" autocomplete="off" /></td>
							<th scope="row">결재자3</th>
							<td><select id="pcAppr3" name="approver3" class="pc-staff-sel"></select></td>
							<th scope="row">청구자</th>
							<td><input type="text" name="claimant" id="pcClaimant" autocomplete="off" /></td>
						</tr>
						<tr>
							<th scope="row">과목</th>
							<td><input type="text" name="subjectTitle" id="pcSubject" autocomplete="off" /></td>
							<th scope="row">결재자2</th>
							<td><select id="pcAppr2" name="approver2" class="pc-staff-sel"></select></td>
							<td colspan="2" class="pc-static-td">본서의 금액을 정히 영수함</td>
						</tr>
						<tr>
							<th scope="row">관</th>
							<td>
								<select id="pcGwan" name="gwan" aria-label="관">
									<option value="">선택</option>
									<option value="보조금">보조금</option>
									<option value="자체조달">자체조달</option>
								</select>
							</td>
							<th scope="row">결재자1</th>
							<td><select id="pcAppr1" name="approver1" class="pc-staff-sel"></select></td>
							<th scope="row">영수자</th>
							<td><input type="text" name="receiver" id="pcReceiver" autocomplete="off" /></td>
						</tr>
						<tr>
							<th scope="row">항</th>
							<td><select id="pcHang" name="hangId" aria-label="항"></select></td>
							<th scope="row">기안자</th>
							<td><select id="pcDrafter" name="drafter" class="pc-staff-sel"></select></td>
							<td colspan="2" rowspan="3" class="pc-evidence-outer">
								<table class="pc-evidence-inner">
									<colgroup>
										<col style="width: 11%;" />
										<col style="width: 22%;" />
										<col style="width: 67%;" />
									</colgroup>
									<tbody>
										<tr>
											<th scope="rowgroup" rowspan="2" class="pc-th-evidence-main">증빙<br />서류</th>
											<th scope="row" class="pc-ev-sub">법정증빙</th>
											<td class="pc-evidence-cell">
												<label><input type="radio" name="pc_evidence" value="1" /> 1. 카드매출전표</label>
												<label><input type="radio" name="pc_evidence" value="2" /> 2. 세금계산서</label>
												<label><input type="radio" name="pc_evidence" value="3" /> 3. 계산서</label>
											</td>
										</tr>
										<tr>
											<th scope="row" class="pc-ev-sub">일반증빙</th>
											<td class="pc-evidence-cell">
												<label><input type="radio" name="pc_evidence" value="4" /> 4. 영수증</label>
												<label><input type="radio" name="pc_evidence" value="5" /> 5. 기타</label>
											</td>
										</tr>
									</tbody>
								</table>
							</td>
						</tr>
						<tr>
							<th scope="row">목</th>
							<td><select id="pcMok" name="mokId" aria-label="목" disabled></select></td>
							<th scope="row">발의(기안)일</th>
							<td><input type="date" name="draftDate" id="pcDraftDate" /></td>
						</tr>
						<tr>
							<th scope="row">세목</th>
							<td><select id="pcSemok" name="semokId" aria-label="세목" disabled></select></td>
							<th scope="row">결재(완료)일</th>
							<td><input type="date" name="completeDate" id="pcCompleteDate" /></td>
						</tr>
						<tr>
							<th scope="row">세부사업</th>
							<td><select id="pcDetail" name="detailId" aria-label="세부사업" disabled></select></td>
							<th scope="row">발의부서명</th>
							<td><input type="text" name="deptName" id="pcDept" autocomplete="off" /></td>
							<th scope="row">세무담당자확인</th>
							<td><select id="pcTax" name="taxManager"></select></td>
						</tr>
						<tr>
							<th scope="row">제목</th>
							<td colspan="3"><input type="text" name="docTitle" id="pcDocTitle" placeholder="예: 대전 행사 출장경비" autocomplete="off" /></td>
							<th scope="row">금액</th>
							<td><input type="text" name="amount" id="pcAmount" inputmode="numeric" autocomplete="off" /></td>
						</tr>
					</tbody>
				</table>
			</div>

			<div class="pc-body-text">
				<label class="pc-body-label" for="pcBody">내용</label>
				<textarea id="pcBody" name="body" placeholder="내용을 입력하세요." rows="8"></textarea>
			</div>

			<div class="pc-file-row">
				<span class="pc-file-label"><strong>파일첨부</strong></span>
				<div class="pc-file-col">
					<div class="pc-file-addline">
						<input type="file" id="pcFileInp" name="attachments" multiple />
						<a href="javascript:void(0);" class="btnLink btnBlueBg" id="pcFileBtn">추가</a>
					</div>
					<ul class="pc-attach-list" id="pcAttachList" aria-live="polite"></ul>
				</div>
			</div>
		</form>
	</div>

	<div class="pc-actions-wrap">
		<ul class="btnList mt20">
			<li class="mr5">
				<a href="javascript:void(0);" class="btnLink btnChaBg" id="pcBtnFinal">전결처리</a>
			</li>
			<li>
				<a href="javascript:void(0);" class="btnLink btnBlueBg" id="pcBtnDraft">기안</a>
			</li>
		</ul>
	</div>

	<script>
(function () {
	var STORAGE_KEYS = ["budgetItemManageTree_v1", "budgetItemManageTree_v2"];
	var STAFF = [
		{ v: "", t: "선택" },
		{ v: "김민수", t: "김민수" },
		{ v: "이영희", t: "이영희" },
		{ v: "박준호", t: "박준호" },
		{ v: "최서연", t: "최서연" },
		{ v: "정대현", t: "정대현" }
	];
	var TAX_STAFF = [
		{ v: "", t: "선택" },
		{ v: "한세무", t: "한세무" },
		{ v: "오지원", t: "오지원" },
		{ v: "신담당", t: "신담당" }
	];

	var treeData = [];

	function loadBudgetTree() {
		for (var i = 0; i < STORAGE_KEYS.length; i++) {
			try {
				var raw = localStorage.getItem(STORAGE_KEYS[i]);
				if (!raw) continue;
				var parsed = JSON.parse(raw);
				if (parsed && Array.isArray(parsed) && parsed.length) return parsed;
			} catch (e) {}
		}
		return [];
	}

	function findNodeById(id, nodes) {
		if (!nodes) nodes = treeData;
		for (var j = 0; j < nodes.length; j++) {
			if (nodes[j].id === id) return nodes[j];
			var ch = nodes[j].children || [];
			var f = findNodeById(id, ch);
			if (f) return f;
		}
		return null;
	}

	function fillSelectNodes(sel, nodes, placeholder, disabled) {
		sel.innerHTML = "";
		var o0 = document.createElement("option");
		o0.value = "";
		o0.textContent = placeholder || "선택";
		sel.appendChild(o0);
		if (!nodes || !nodes.length) {
			sel.disabled = !!disabled;
			return;
		}
		for (var i = 0; i < nodes.length; i++) {
			var n = nodes[i];
			if (n.used === false) continue;
			var o = document.createElement("option");
			o.value = n.id;
			o.textContent = n.name || "";
			sel.appendChild(o);
		}
		sel.disabled = !!disabled;
	}

	function resetLowerFromMok() {
		var semok = document.getElementById("pcSemok");
		var detail = document.getElementById("pcDetail");
		fillSelectNodes(semok, [], "세목 선택", true);
		fillSelectNodes(detail, [], "세부사업 선택", true);
	}

	function resetLowerFromSemok() {
		var detail = document.getElementById("pcDetail");
		fillSelectNodes(detail, [], "세부사업 선택", true);
	}

	function onHangChange() {
		var mok = document.getElementById("pcMok");
		var semok = document.getElementById("pcSemok");
		var detail = document.getElementById("pcDetail");
		var hid = document.getElementById("pcHang").value;
		if (!hid) {
			fillSelectNodes(mok, [], "목 선택", true);
			fillSelectNodes(semok, [], "세목 선택", true);
			fillSelectNodes(detail, [], "세부사업 선택", true);
			return;
		}
		var node = findNodeById(hid);
		var kids = node && node.children ? node.children : [];
		var usable = kids.filter(function (c) { return c.used !== false; });
		if (!usable.length) {
			fillSelectNodes(mok, [], "목 선택", true);
			fillSelectNodes(semok, [], "세목 선택", true);
			fillSelectNodes(detail, [], "세부사업 선택", true);
			return;
		}
		fillSelectNodes(mok, usable, "목 선택", false);
		fillSelectNodes(semok, [], "세목 선택", true);
		fillSelectNodes(detail, [], "세부사업 선택", true);
	}

	function onMokChange() {
		var semok = document.getElementById("pcSemok");
		var detail = document.getElementById("pcDetail");
		var mid = document.getElementById("pcMok").value;
		if (!mid) {
			resetLowerFromMok();
			return;
		}
		var node = findNodeById(mid);
		var kids = node && node.children ? node.children : [];
		var usable = kids.filter(function (c) { return c.used !== false; });
		if (!usable.length) {
			fillSelectNodes(semok, [], "세목 선택", true);
			fillSelectNodes(detail, [], "세부사업 선택", true);
			return;
		}
		fillSelectNodes(semok, usable, "세목 선택", false);
		fillSelectNodes(detail, [], "세부사업 선택", true);
	}

	function onSemokChange() {
		var detail = document.getElementById("pcDetail");
		var sid = document.getElementById("pcSemok").value;
		if (!sid) {
			resetLowerFromSemok();
			return;
		}
		var node = findNodeById(sid);
		var kids = node && node.children ? node.children : [];
		var usable = kids.filter(function (c) { return c.used !== false; });
		if (!usable.length) {
			fillSelectNodes(detail, [], "세부사업 선택", true);
			return;
		}
		fillSelectNodes(detail, usable, "세부사업 선택", false);
	}

	function fillStaffSelect(sel) {
		sel.innerHTML = "";
		for (var i = 0; i < STAFF.length; i++) {
			var o = document.createElement("option");
			o.value = STAFF[i].v;
			o.textContent = STAFF[i].t;
			sel.appendChild(o);
		}
	}

	function fillTaxSelect(sel) {
		sel.innerHTML = "";
		for (var i = 0; i < TAX_STAFF.length; i++) {
			var o = document.createElement("option");
			o.value = TAX_STAFF[i].v;
			o.textContent = TAX_STAFF[i].t;
			sel.appendChild(o);
		}
	}

	function todayISO() {
		var d = new Date();
		var m = String(d.getMonth() + 1).padStart(2, "0");
		var day = String(d.getDate()).padStart(2, "0");
		return d.getFullYear() + "-" + m + "-" + day;
	}

	function yearOptions() {
		var sel = document.getElementById("pcYear");
		var y = new Date().getFullYear();
		sel.innerHTML = "";
		for (var i = y - 3; i <= y + 5; i++) {
			var o = document.createElement("option");
			o.value = String(i);
			o.textContent = String(i);
			if (i === y) o.selected = true;
			sel.appendChild(o);
		}
	}

	function hasExtraOptions(sel) {
		return sel.options.length > 1;
	}

	function validateBimChain() {
		var hang = document.getElementById("pcHang");
		var mok = document.getElementById("pcMok");
		var semok = document.getElementById("pcSemok");
		var detail = document.getElementById("pcDetail");
		if (!treeData.length) {
			alert("항목관리에 등록된 항목이 없습니다. 항목관리에서 예산 항목을 먼저 등록하세요.");
			return false;
		}
		if (!hang.value) {
			alert("「항」을 선택하세요.");
			return false;
		}
		if (!mok.disabled && hasExtraOptions(mok) && !mok.value) {
			alert("「목」을 선택하세요. (해당 항에 하위 목록이 등록되어 있습니다.)");
			return false;
		}
		if (!semok.disabled && hasExtraOptions(semok) && !semok.value) {
			alert("「세목」을 선택하세요.");
			return false;
		}
		if (!detail.disabled && hasExtraOptions(detail) && !detail.value) {
			alert("「세부사업」을 선택하세요.");
			return false;
		}
		return true;
	}

	function fitPopupWindowToContent() {
		try {
			var root = document.documentElement;
			var h = root.scrollHeight;
			if (h < 80) return;
			var chromeY = window.outerHeight - window.innerHeight;
			var chromeX = window.outerWidth - window.innerWidth;
			var targetW = Math.min(root.scrollWidth + chromeX, screen.availWidth - 8);
			var targetH = Math.min(h + chromeY, screen.availHeight - 8);
			if (targetH < 160) return;
			window.resizeTo(Math.round(targetW), Math.round(targetH));
		} catch (e) {}
	}

	function validateEvidence() {
		var radios = document.querySelectorAll('input[name="pc_evidence"]:checked');
		if (!radios.length) {
			alert("증빙서류를 한 가지 선택하세요.");
			return false;
		}
		return true;
	}

	var pcAttachmentList = [];
	var PC_ATTACH_MAX_BYTES = 1024 * 1024;
	var APPROVAL_PC_STORAGE_KEY = "approval_payment_conference_list_v1";

	function getSelectText(id) {
		var el = document.getElementById(id);
		if (!el || el.selectedIndex < 0) return "";
		var t = el.options[el.selectedIndex].textContent || "";
		t = String(t).replace(/\s/g, " ").trim();
		if (t === "선택") return "";
		return t;
	}

	function formatDraftDateDisplay(ymd) {
		var s = String(ymd || "").trim();
		var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
		if (!m) return s;
		var y = parseInt(m[1], 10) % 100;
		return ("0" + y).slice(-2) + "/" + m[2] + "/" + m[3];
	}

	function savePcDraftToApprovalList() {
		var titleEl = document.getElementById("pcDocTitle");
		var title = titleEl && titleEl.value ? String(titleEl.value).trim() : "";
		if (!title) title = "(제목 없음)";
		var item = {
			id: "pc_" + Date.now(),
			title: title,
			drafter: getSelectText("pcDrafter"),
			draftDateDisplay: formatDraftDateDisplay(
				document.getElementById("pcDraftDate") && document.getElementById("pcDraftDate").value
			),
			nextApprover: getSelectText("pcAppr1"),
			attachCount: pcAttachmentList.length,
			status: "progress",
			createdAt: new Date().toISOString()
		};
		var list = [];
		try {
			list = JSON.parse(localStorage.getItem(APPROVAL_PC_STORAGE_KEY) || "[]");
			if (!Array.isArray(list)) list = [];
		} catch (e) {
			list = [];
		}
		list.unshift(item);
		try {
			localStorage.setItem(APPROVAL_PC_STORAGE_KEY, JSON.stringify(list));
		} catch (e2) {
			alert("저장 공간이 부족합니다. 첨부를 줄이거나 브라우저 저장소를 정리한 뒤 다시 시도하세요.");
			return false;
		}
		try {
			var w = window;
			for (var oi = 0; oi < 6 && w; oi++) {
				if (typeof w.renderApprovalListFromStorage === "function") {
					w.renderApprovalListFromStorage();
					break;
				}
				w = w.opener;
			}
			if (typeof window.top !== "undefined" && window.top && typeof window.top.renderApprovalListFromStorage === "function") {
				window.top.renderApprovalListFromStorage();
			}
		} catch (e3) {}
		return true;
	}

	function formatPcAttachSize(n) {
		if (n == null || isNaN(n)) return "";
		var x = Number(n);
		if (x < 1024) return x + " B";
		if (x < 1048576) return (x / 1024).toFixed(1) + " KB";
		return (x / 1048576).toFixed(1) + " MB";
	}

	function syncPcFileInput() {
		var inp = document.getElementById("pcFileInp");
		if (!inp || typeof DataTransfer === "undefined") return;
		try {
			var dt = new DataTransfer();
			pcAttachmentList.forEach(function (m) {
				if (m && m._file) dt.items.add(m._file);
			});
			inp.files = dt.files;
		} catch (e) {}
	}

	function triggerPcAttachmentDownload(meta) {
		var url = meta && meta.dataUrl != null ? String(meta.dataUrl).trim() : "";
		if (!url || url.indexOf("data:") !== 0) return;
		try {
			var a = document.createElement("a");
			a.href = url;
			a.download = (meta && meta.name) || "download";
			a.rel = "noopener";
			document.body.appendChild(a);
			a.click();
			document.body.removeChild(a);
		} catch (eDl) {
			alert("다운로드를 시작할 수 없습니다. 브라우저 설정을 확인하거나 파일을 다시 첨부해 주세요.");
		}
	}

	function renderPcAttachList() {
		var ul = document.getElementById("pcAttachList");
		if (!ul) return;
		ul.innerHTML = "";
		pcAttachmentList.forEach(function (meta, idx) {
			var li = document.createElement("li");
			var span = document.createElement("span");
			span.className = "pc-attach-name";
			var sz = meta.size != null ? " (" + formatPcAttachSize(meta.size) + ")" : "";
			span.textContent = (meta.name || "") + sz;

			var actions = document.createElement("span");
			actions.className = "pc-attach-actions";

			var btnDl = document.createElement("button");
			btnDl.type = "button";
			btnDl.className = "pc-attach-dl";
			btnDl.innerHTML = '<i class="fa-solid fa-download" aria-hidden="true"></i>';
			btnDl.setAttribute("aria-label", "파일 받기");
			btnDl.title = "받기";
			var urlOk =
				meta &&
				String(meta.dataUrl || "")
					.trim()
					.indexOf("data:") === 0;
			btnDl.disabled = !urlOk;
			if (!urlOk) btnDl.title = "1MB 초과 등으로 미리보기·받기 데이터 없음(제출용 파일은 유지)";

			btnDl.addEventListener("click", function (e) {
				e.preventDefault();
				var di = idx;
				var m = pcAttachmentList[di];
				if (m && String(m.dataUrl || "").trim().indexOf("data:") === 0) {
					triggerPcAttachmentDownload(m);
				}
			});

			var btnRm = document.createElement("button");
			btnRm.type = "button";
			btnRm.className = "pc-attach-remove";
			btnRm.innerHTML = '<i class="fa-solid fa-xmark" aria-hidden="true"></i>';
			btnRm.setAttribute("aria-label", "첨부 삭제");
			btnRm.title = "삭제";
			btnRm.addEventListener("click", function (e) {
				e.preventDefault();
				pcAttachmentList.splice(idx, 1);
				renderPcAttachList();
			});

			actions.appendChild(btnDl);
			actions.appendChild(btnRm);
			li.appendChild(span);
			li.appendChild(actions);
			ul.appendChild(li);
		});
		syncPcFileInput();
		try {
			setTimeout(fitPopupWindowToContent, 60);
		} catch (e2) {}
	}

	function wirePcAttachments() {
		var inp = document.getElementById("pcFileInp");
		var btn = document.getElementById("pcFileBtn");
		if (!inp || !btn) return;
		btn.addEventListener("click", function (e) {
			e.preventDefault();
			inp.click();
		});
		inp.addEventListener("change", function () {
			var list = Array.prototype.slice.call(inp.files || [], 0);
			inp.value = "";
			if (!list.length) return;
			var i = 0;
			function appendOne(f, dataUrl) {
				pcAttachmentList.push({
					name: f.name,
					size: f.size,
					type: f.type || "",
					_file: f,
					dataUrl: dataUrl || ""
				});
			}
			function next() {
				if (i >= list.length) {
					renderPcAttachList();
					return;
				}
				var f = list[i++];
				if (f.size > PC_ATTACH_MAX_BYTES) {
					alert(
						"미리보기·다시 받기용 저장은 파일당 최대 " +
							Math.round(PC_ATTACH_MAX_BYTES / 1024 / 1024) +
							"MB입니다.\n제출에는 포함되며, 미리보기 없이 목록에만 표시합니다:\n" +
							f.name
					);
					appendOne(f, "");
					next();
					return;
				}
				var fr = new FileReader();
				fr.onload = function () {
					appendOne(f, fr.result || "");
					next();
				};
				fr.onerror = function () {
					appendOne(f, "");
					next();
				};
				fr.readAsDataURL(f);
			}
			next();
		});
	}

	function wire() {
		yearOptions();
		treeData = loadBudgetTree();
		var hintRow = document.getElementById("pcBimHintRow");
		if (hintRow && !treeData.length) {
			hintRow.style.display = "table-row";
		}

		var hang = document.getElementById("pcHang");
		var roots = treeData.filter(function (n) { return n.used !== false; });
		fillSelectNodes(hang, roots, "항 선택", !roots.length);
		fillSelectNodes(document.getElementById("pcMok"), [], "목 선택", true);
		fillSelectNodes(document.getElementById("pcSemok"), [], "세목 선택", true);
		fillSelectNodes(document.getElementById("pcDetail"), [], "세부사업 선택", true);

		hang.addEventListener("change", onHangChange);
		document.getElementById("pcMok").addEventListener("change", onMokChange);
		document.getElementById("pcSemok").addEventListener("change", onSemokChange);

		["pcAppr1", "pcAppr2", "pcAppr3", "pcAppr4", "pcDrafter"].forEach(function (id) {
			fillStaffSelect(document.getElementById(id));
		});
		fillTaxSelect(document.getElementById("pcTax"));

		var td = todayISO();
		document.getElementById("pcDraftDate").value = td;
		document.getElementById("pcCompleteDate").value = td;

		wirePcAttachments();

		document.getElementById("pcBtnFinal").addEventListener("click", function () {
			if (!validateBimChain()) return;
			if (!validateEvidence()) return;
			var n = pcAttachmentList.length;
			alert(
				"전결 처리는 연동 전입니다. (퍼블 확인용)\n첨부 파일: " + n + "건 (실제 전송은 서버 연동 후 가능)"
			);
		});
		document.getElementById("pcBtnDraft").addEventListener("click", function () {
			if (!validateBimChain()) return;
			if (!validateEvidence()) return;
			if (!savePcDraftToApprovalList()) return;
			var n = pcAttachmentList.length;
			alert(
				"기안이 결재관리 목록에 등록되었습니다.\n첨부 파일: " +
					n +
					"건\n\n※ 서버 저장·연동은 추후 적용 예정입니다."
			);
		});
	}

	if (document.readyState === "loading") {
		document.addEventListener("DOMContentLoaded", wire);
	} else {
		wire();
	}

	window.addEventListener("load", function () {
		requestAnimationFrame(function () {
			requestAnimationFrame(fitPopupWindowToContent);
		});
	});
})();
	</script>
</body>
</html>
