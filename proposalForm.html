<script>
	function businessDownloadFile(attachmentId) {

	    // 히든 폼 생성
	    var form = document.createElement("form");
	    form.style.display = "none";
	    form.method = "POST";
	    form.action = '/wkwhrma/api/file/approvalDownloadFile.do';

	    // 데이터를 FormData로 추가
	    var formData = new FormData();
	    formData.append('attachmentId', attachmentId);
	    formData.append('documentId', "22");

	    // 폼 데이터를 POST로 전송할 수 있도록 form에 추가
	    for (var pair of formData.entries()) {
	        var input = document.createElement("input");
	        input.type = "hidden";
	        input.name = pair[0];
	        input.value = pair[1];
	        form.appendChild(input);
	    }

	    // 히든 iframe 생성
	    var iframe = document.createElement("iframe");
	    iframe.style.display = "none";
	    iframe.name = "downloadIframe";  // iframe에 name 속성 추가
	    document.body.appendChild(iframe);

	    // form의 target을 iframe으로 설정하여 결과를 iframe에 로드
	    form.target = iframe.name;

	    // 파일 다운로드가 성공했을 경우
	    iframe.onload = function() {
	        var response = iframe.contentWindow.document.body.innerHTML;
	        // 예를 들어, HTML 내부에 'error-code' 문구가 포함되어 있다면 에러 페이지로 판단
	        if (response.indexOf('error-code') !== -1) {
	            alert("파일을 찾을 수 없습니다.");
	        } else {
	            console.log("파일 다운로드 성공");
	        }
	        document.body.removeChild(iframe);  // 완료 후 iframe 제거
	    };

	    // 파일 다운로드가 실패했을 경우 (에러 처리)
	    iframe.onerror = function() {
	        alert("파일 다운로드 중 오류가 발생했습니다.");
	        document.body.removeChild(iframe);  // 오류 발생 시 iframe 제거
	    };

	    // 폼을 body에 추가하고 제출
	    document.body.appendChild(form);
	    form.submit();
	    document.body.removeChild(form); // 폼 제출 후 폼 제거
	}
</script>
