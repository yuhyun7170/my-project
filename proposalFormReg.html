<!DOCTYPE html>
<html lang="ko">

			overflow-x: hidden !important;
		}
		.popBody {
			width: 436px;
		}
		.popTitle {
			margin-bottom: 6px;
		}
		.table_write table {

			border-collapse: collapse;
		}
		.table_write th,
		.table_write td {
			vertical-align: middle;
			padding: 4px 6px !important;
		}
		.table_write td {
			text-align: left;
		}
		.table_write .exp-select {
			width: 98%;
			max-width: 100%;
			box-sizing: border-box;
		}
		.table_write .exp-input {

			max-width: 100%;

			padding: 4px 6px;

	<script>
	(function () {
		var STORAGE_KEY_V1 = "budgetTreeItems_v1";
		var STORAGE_KEY = "budgetTreeItems_v2";
		var EXPENSE_PLAN_KEY = "statistics5_expensePlan_v1";

		function getCsvSeedText() {
			return `,,,
구분1,구분2,구분3,구분4
,,,
소비홍보,광고,품질향상,현수막 제작 및 게첨
,,소비촉진,TV광고(PPL)
수급안정,가격안정,수급조절사업,'25년산 가격안정 행사
,,,주산지 포도축제 행사
,,,포도데이 행사 등
,,,과일산업대전 행사
,,,연말 수급조절 행사
,,,판촉홍보물 제작 등
,수급안정 예비비,수급안정 예비비,농업수입안정보험 등 지원사업(보류)
경쟁력제고,품질향상,교육자료 발간 등,재배기술 책자 발간 등
,,,영상자료 링크
,,,담당자 교육
,생산성향상,샤인머스켓 이외 품종 삽목묘 구입비 지원,삽목묘 구입비 지원
교육 및 정보제공,교육,거출률광고,버스외부광고
,,사무국 주관 농가교육,사무국 주관 교육
,,회원농협 주관 농가교육,회원농협 주관 교육
,정보제공,거출금 고지 등,거출금 고지
,,,문자 발송
,,,영농일지 등 제작
,,홈페이지 관리?운영 등,수납관리시스템관리
,,,홈페이지유지관리
,,,인스타그램 운영
수납위탁 수수료,수납기관 수수료,수납지원,수납기관 수수료(가상계좌)
운영관리,인건비,급여 및 퇴직연금,급여 및 퇴직연금
,,법정부담금,법정부담금(4대보험)
,경비,대의원회,임차료
,,,"참석수당(대면, 서면)"
,,,인쇄비 등
,,,기타(참석자 식대 등)
,,"회의비(이사회, 관리위원회 등)",임차료
,,,"참석수당(대면, 서면)"
,,,인쇄비 등
,,,기타(참석자 식대 등)
,,수용비,사무국 운영비 등
,,,의무자조금단체 연회비
,,,해직자 고발 건 대응 노무사비 등
,,제수수료,"외부회계감사, 세무기장료, 등기 등"
,,업무추진비,업무추진비
,,직무수행비,회장
,,여비,출장여비 등
,,통신비,전화요금 및 우편료 등
,,임차료,"임차료(사무실 임차료, 렌터카 등)"
,자산취득비,자산취득비,중요재산`;
		}

		function parseCsv4(text) {
			var rows = [];
			var row = [];
			var field = "";
			var inQuotes = false;
			for (var i = 0; i < text.length; i++) {
				var ch = text[i];
				if (ch === "\"") {
					if (inQuotes && text[i + 1] === "\"") {
						field += "\"";
						i++;
					} else {
						inQuotes = !inQuotes;
					}
					continue;
				}
				if (ch === "," && !inQuotes) {
					row.push(field);
					field = "";
					continue;
				}
				if ((ch === "\n" || ch === "\r") && !inQuotes) {
					if (ch === "\r" && text[i + 1] === "\n") i++;
					row.push(field);
					field = "";
					while (row.length < 4) row.push("");
					rows.push(row.slice(0, 4));
					row = [];
					continue;
				}
				field += ch;
			}
			if (field.length || row.length) {
				row.push(field);
				while (row.length < 4) row.push("");
				rows.push(row.slice(0, 4));
			}
			return rows;
		}

		function buildItemsFromSeedCsv4(csvText) {
			var rows = parseCsv4(csvText);
			var current = ["", "", "", ""];
			var mapKey = {};
			var childrenCount = {};
			var items = {};

			function getId(depth, parentId, name) {
				if (!name) return null;
				var key = depth + "|" + parentId + "|" + name;
				if (mapKey[key]) return mapKey[key];
				var ck = depth + "|" + parentId;
				var idx = (childrenCount[ck] || 0) + 1;
				childrenCount[ck] = idx;
				var id = depth === 1 ? String(idx) : parentId + "-" + String(idx);
				mapKey[key] = id;
				items[id] = { name: name, alloc: "", spent: "", approvalDate: "", note: "", active: true };
				return id;
			}

			for (var r = 0; r < rows.length; r++) {
				var cols = rows[r].map(function (c) {
					return (c == null ? "" : String(c)).trim();
				});
				if (cols.every(function (c) { return !c; })) continue;
				if (cols.some(function (c) { return c.indexOf("구분") !== -1; })) continue;

				var deepest = 0;
				for (var d0 = 0; d0 < 4; d0++) {
					if (cols[d0] !== "") deepest = d0 + 1;
				}
				if (deepest === 0) continue;

				for (var d1 = 0; d1 < deepest; d1++) {
					if (cols[d1] !== "") {
						current[d1] = cols[d1];
						for (var e = d1 + 1; e < 4; e++) current[e] = "";
					}
				}

				var parent = "";
				for (var d2 = 1; d2 <= deepest; d2++) {
					var nm = current[d2 - 1];
					if (!nm) break;
					parent = getId(d2, parent, nm) || parent;
				}
			}

			return items;
		}

		function migrateV1ToV2() {
			try {
				if (localStorage.getItem(STORAGE_KEY)) return;
				var raw = localStorage.getItem(STORAGE_KEY_V1);
				if (!raw) return;
				var data = JSON.parse(raw);
				var items = {};
				Object.keys(data.items || {}).forEach(function (k) {
					var it = data.items[k];
					items[k] = {
						name: (it && it.name) || "",
						alloc:
							it && it.alloc != null && String(it.alloc).trim() !== ""
								? it.alloc
								: it && it.amount != null
									? it.amount
									: "",
						spent: it && it.spent != null ? it.spent : "",
						approvalDate: it && it.approvalDate != null ? String(it.approvalDate) : "",
						note: it && it.note != null ? String(it.note) : "",
						active: true
					};
				});
				var y = String(new Date().getFullYear());
				localStorage.setItem(
					STORAGE_KEY,
					JSON.stringify({
						years: (function () {
							var o = {};
							o[y] = { items: items, deleted: data.deleted || [] };
							return o;
						})()
					})
				);
			} catch (e) {}
		}

		function readRoot() {
			try {
				var raw = localStorage.getItem(STORAGE_KEY);
				if (!raw) return { years: {} };
				return JSON.parse(raw);
			} catch (e) {
				return { years: {} };
			}
		}

		function writeRoot(root) {
			localStorage.setItem(STORAGE_KEY, JSON.stringify(root));
		}

		function getYearPayload(year) {
			var root = readRoot();
			var y = (root && root.years) || {};
			return y[year] || { items: {}, deleted: [] };
		}

		function setYearPayload(year, payload2) {
			var root = readRoot();
			if (!root.years) root.years = {};
			root.years[year] = payload2;
			writeRoot(root);
		}

		function getUrlBudgetEdit() {
			try {
				var u = new URLSearchParams(window.location.search || "");
				var bid = u.get("budgetId") || u.get("id") || "";
				var ed = u.get("edit") === "1" || u.get("mode") === "edit";
				return { budgetId: bid, edit: ed && !!bid };
			} catch (e0) {
				return { budgetId: "", edit: false };
			}
		}

		function resolveYear() {
			try {
				var u = new URLSearchParams(window.location.search || "");
				var y = u.get("year");
				if (y) return y;
			} catch (e1) {}
			var root = readRoot();
			var years = root.years || {};
			var best = null;
			var bestCount = -1;
			Object.keys(years).forEach(function (yy) {
				var n = Object.keys((years[yy] && years[yy].items) || {}).length;
				if (n > bestCount) {
					bestCount = n;
					best = yy;
				}
			});
			if (best) return best;
			return String(new Date().getFullYear());
		}

		function depthFromId(id) {
			return id ? String(id).trim().split("-").length : 1;
		}

		function parentDepth1(id) {
			return String(id).split("-")[0] || "";
		}

		/** 지출계획(Statistics5) 해당 항 블록의 줄 id 중 최대 깊이. 없거나 없으면 1 */
		function requiredDepthFromExpensePlanForHang(hangId, yKey) {
			if (!hangId) return 1;
			var raw = localStorage.getItem(EXPENSE_PLAN_KEY);
			if (!raw) return 1;
			var eroot;
			try {
				eroot = JSON.parse(raw);
			} catch (e) {
				return 1;
			}
			var ys = String(yKey);
			var epl = eroot.years && (eroot.years[ys] != null ? eroot.years[ys] : eroot.years[yKey]);
			if (!epl || !epl.blocks || !epl.blocks.length) return 1;
			var maxD = 0;
			var h = String(hangId);
			for (var bi = 0; bi < epl.blocks.length; bi++) {
				var b = epl.blocks[bi];
				if (String(b.p1) !== h) continue;
				var lids = b.lineIds || [];
				for (var i = 0; i < lids.length; i++) {
					var lid = lids[i];
					if (parentDepth1(lid) !== h) continue;
					var d = depthFromId(lid);
					if (d > maxD) maxD = d;
				}
			}
			return maxD > 0 ? maxD : 1;
		}

		function depthRequirementLabel(d) {
			if (d >= 4) return "세부사업";
			if (d === 3) return "세목";
			if (d === 2) return "목";
			return "항";
		}

		function parentIdFromBudgetId(id) {
			if (!id) return "";
			var parts = String(id).split("-");
			return parts.length <= 1 ? "" : parts.slice(0, -1).join("-");
		}

		function deletedSet(pl) {
			return new Set(pl.deleted || []);
		}

		function sortIds(ids) {
			return ids.slice().sort(function (a, b) {
				var la = String(a).split("-").slice(-1)[0];
				var lb = String(b).split("-").slice(-1)[0];
				var na = parseInt(la, 10);
				var nb = parseInt(lb, 10);
				if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
				return String(a).localeCompare(String(b), "ko-KR");
			});
		}

		function getChildIds(pl, depth, parentId) {
			var ds = deletedSet(pl);
			var items = pl.items || {};
			var pid = parentId || "";
			var out = [];
			Object.keys(items).forEach(function (id) {
				if (ds.has(id)) return;
				if (depthFromId(id) !== depth) return;
				if (parentIdFromBudgetId(id) !== pid) return;
				var it = items[id];
				if (it && it.active === false) return;
				out.push(id);
			});
			return sortIds(out);
		}

		function fillSelectByIds(sel, ids, items, placeholder) {
			sel.innerHTML = "";
			var o0 = document.createElement("option");
			o0.value = "";
			o0.textContent = placeholder || "선택";
			sel.appendChild(o0);
			for (var i = 0; i < ids.length; i++) {
				var id = ids[i];
				var it = items[id] || {};
				var nm = it.name != null ? String(it.name) : "";
				var o = document.createElement("option");
				o.value = id;
				o.textContent = nm;
				sel.appendChild(o);
			}
		}

		migrateV1ToV2();
		var yearKey = resolveYear();
		var payload = getYearPayload(yearKey);
		if (!payload.items || Object.keys(payload.items).length === 0) {
			payload = {
				items: buildItemsFromSeedCsv4(getCsvSeedText()),
				deleted: [],
				order: []
			};
			setYearPayload(yearKey, payload);
		}

		var items = payload.items;

		var selHang = document.getElementById("selHang");
		var selMok = document.getElementById("selMok");
		var selSemok = document.getElementById("selSemok");
		var selDetail = document.getElementById("selDetail");

		function refreshMok() {
			var pid = selHang.value;
			fillSelectByIds(selMok, pid ? getChildIds(payload, 2, pid) : [], items, "목 선택");
			selSemok.value = "";
			selDetail.value = "";
			fillSelectByIds(selSemok, [], items, "세목 선택");
			fillSelectByIds(selDetail, [], items, "세부사업 선택");
		}

		function refreshSemok() {
			var pid = selMok.value;
			fillSelectByIds(selSemok, pid ? getChildIds(payload, 3, pid) : [], items, "세목 선택");
			selDetail.value = "";
			fillSelectByIds(selDetail, [], items, "세부사업 선택");
		}

		function refreshDetail() {
			var pid = selSemok.value;
			fillSelectByIds(selDetail, pid ? getChildIds(payload, 4, pid) : [], items, "세부사업 선택");
		}

		fillSelectByIds(selHang, getChildIds(payload, 1, ""), items, "항 선택");
		fillSelectByIds(selMok, [], items, "목 선택");
		fillSelectByIds(selSemok, [], items, "세목 선택");
		fillSelectByIds(selDetail, [], items, "세부사업 선택");

		selHang.addEventListener("change", refreshMok);
		selMok.addEventListener("change", refreshSemok);
		selSemok.addEventListener("change", refreshDetail);

		var urlBe = getUrlBudgetEdit();
		var editMode = urlBe.edit;
		var editBudgetId = urlBe.budgetId || "";

		var attachmentList = [];
		/** 다시 다운로드용 Data URL 저장 상한(원본 파일 크기, 약 1MB) */
		var ATTACH_MAX_BYTES = 1024 * 1024;

		function triggerAttachmentDownload(meta) {
			if (!meta || !meta.dataUrl) return;
			var a = document.createElement("a");
			a.href = meta.dataUrl;
			a.download = meta.name || "download";
			a.rel = "noopener";
			document.body.appendChild(a);
			a.click();
			document.body.removeChild(a);
		}

		function formatAttachSize(n) {
			if (n == null || isNaN(n)) return "";
			var x = Number(n);
			if (x < 1024) return x + " B";
			if (x < 1048576) return (x / 1024).toFixed(1) + " KB";
			return (x / 1048576).toFixed(1) + " MB";
		}

		function renderAttachList() {
			var ul = document.getElementById("expAttachList");
			if (!ul) return;
			ul.innerHTML = "";
			attachmentList.forEach(function (meta, idx) {
				var li = document.createElement("li");
				var span = document.createElement("span");
				var sz = meta.size != null ? " (" + formatAttachSize(meta.size) + ")" : "";
				span.textContent = (meta.name || "") + sz;
				span.style.flex = "1";
				span.style.minWidth = "0";

				var actions = document.createElement("span");
				actions.className = "exp-attach-actions";

				var btnDl = document.createElement("button");
				btnDl.type = "button";
				btnDl.className = "exp-attach-dl";
				btnDl.innerHTML = '<i class="fa-solid fa-download" aria-hidden="true"></i>';
				btnDl.setAttribute("aria-label", "파일 다운로드");
				var hasData = !!(meta && meta.dataUrl);
				btnDl.disabled = !hasData;
				btnDl.title = hasData ? "다운로드" : "다운로드용 데이터 없음(용량 초과 또는 이전에 메타만 저장됨)";
				btnDl.addEventListener("click", function (e) {
					e.preventDefault();
					var m = attachmentList[idx];
					if (m && m.dataUrl) triggerAttachmentDownload(m);
				});

				var btn = document.createElement("button");
				btn.type = "button";
				btn.className = "exp-attach-remove";
				btn.innerHTML = '<i class="fa-solid fa-xmark" aria-hidden="true"></i>';
				btn.setAttribute("aria-label", "첨부 삭제");
				btn.title = "삭제";
				btn.setAttribute("data-i", String(idx));
				btn.addEventListener("click", function () {
					var j = parseInt(btn.getAttribute("data-i"), 10);
					if (!isNaN(j)) attachmentList.splice(j, 1);
					renderAttachList();
				});

				actions.appendChild(btnDl);
				actions.appendChild(btn);
				li.appendChild(span);
				li.appendChild(actions);
				ul.appendChild(li);
			});
		}

		function applyBudgetIdToSelects(bid) {
			var p = String(bid).split("-").filter(function (x) { return x !== ""; });
			var d = p.length;
			if (d < 1) return;
			selHang.value = p[0];
			refreshMok();
			if (d >= 2) {
				selMok.value = p.slice(0, 2).join("-");
				refreshSemok();
			}
			if (d >= 3) {
				selSemok.value = p.slice(0, 3).join("-");
				refreshDetail();
			}
			if (d >= 4) selDetail.value = bid;
		}

		if (editMode && editBudgetId) {
			applyBudgetIdToSelects(editBudgetId);
			var itEdit = items[editBudgetId] || {};
			var inpAmt = document.getElementById("inpAmount");
			if (inpAmt) inpAmt.value = itEdit.spent != null ? String(itEdit.spent) : "";
			var apprEl0 = document.getElementById("inpApprovalDate");
			if (apprEl0 && itEdit.approvalDate) apprEl0.value = String(itEdit.approvalDate).trim();
			var noteEl0 = document.getElementById("inpNote");
			if (noteEl0) noteEl0.value = itEdit.note != null ? String(itEdit.note) : "";
			var taxEl0 = document.getElementById("selTaxManager");
			if (taxEl0 && itEdit.taxManager) taxEl0.value = String(itEdit.taxManager);
			var ttl = document.getElementById("expRegTitle");
			if (ttl) ttl.innerHTML = '<i class="fa-solid fa-circle-dot"></i> 비용처리 수정';
			var btnLb = document.getElementById("btnSubmitLabel");
			if (btnLb) btnLb.textContent = "수 정";
			var btnIc = document.querySelector("#btnSubmit .fa-plus");
			if (btnIc) {
				btnIc.classList.remove("fa-plus");
				btnIc.classList.add("fa-check");
			}
			if (itEdit.attachments && Array.isArray(itEdit.attachments) && itEdit.attachments.length) {
				attachmentList = itEdit.attachments.map(function (a) {
					return {
						name: a && a.name != null ? String(a.name) : "",
						size: a && a.size != null ? Number(a.size) : 0,
						type: a && a.type != null ? String(a.type) : "",
						dataUrl: a && a.dataUrl != null ? String(a.dataUrl) : ""
					};
				});
				renderAttachList();
			}
		}

		var inpAtt = document.getElementById("inpAttachments");
		if (inpAtt) {
			inpAtt.addEventListener("change", function () {
				var files = inpAtt.files;
				if (!files || !files.length) return;
				inpAtt.value = "";
				var list = Array.prototype.slice.call(files, 0);
				var i = 0;
				function appendOne(f, dataUrl) {
					attachmentList.push({
						name: f.name,
						size: f.size,
						type: f.type || "",
						dataUrl: dataUrl || ""
					});
				}
				function next() {
					if (i >= list.length) {
						renderAttachList();
						return;
					}
					var f = list[i++];
					if (f.size > ATTACH_MAX_BYTES) {
						alert(
							"다운로드용 저장은 파일당 최대 " +
								Math.round(ATTACH_MAX_BYTES / 1024 / 1024) +
								"MB입니다.\n메타데이터만 저장됩니다: " +
								f.name
						);
						appendOne(f, "");
						next();
						return;
					}
					var fr = new FileReader();
					fr.onload = function () {
						appendOne(f, fr.result || "");
						next();
					};
					fr.onerror = function () {
						appendOne(f, "");
						next();
					};
					fr.readAsDataURL(f);
				}
				next();
			});
		}

		function itemName(id) {
			var it = items[id];
			return it && it.name != null ? String(it.name).trim() : "";
		}

		function parseAmountPlain(s) {
			if (s == null) return 0;
			var t = String(s).replace(/[,\s]/g, "").trim();
			if (t === "" || t === "—" || t === "-" || t === "–") return 0;
			var n = parseFloat(t);
			return isNaN(n) ? 0 : n;
		}

		function trySubmit() {
			if (!selHang.value) {
				alert("항을 선택하세요.");
				return;
			}
			if (!document.getElementById("inpAmount").value.trim()) {
				alert("집행액을 입력하세요.");
				return;
			}
			if (!document.getElementById("selTaxManager").value) {
				alert("세무담당자를 선택하세요.");
				return;
			}

			var targetId =
				selDetail.value || selSemok.value || selMok.value || selHang.value;
			var reqDepth = requiredDepthFromExpensePlanForHang(selHang.value, yearKey);
			var selDepth = depthFromId(targetId);
			if (reqDepth > 1 && selDepth < reqDepth) {
				alert(
					"지출계획에서 이 항에 " +
						depthRequirementLabel(reqDepth) +
						" 단계까지 등록되어 있습니다.\n비용처리 등록·수정 시 " +
						depthRequirementLabel(reqDepth) +
						"까지 선택해 주세요."
				);
				return;
			}
			var inpAmtVal = parseAmountPlain(document.getElementById("inpAmount").value);
			var apprEl = document.getElementById("inpApprovalDate");
			var apprVal = apprEl && apprEl.value ? String(apprEl.value).trim() : "";
			var noteVal = document.getElementById("inpNote") ? String(document.getElementById("inpNote").value || "").trim() : "";
			var taxVal = document.getElementById("selTaxManager") ? String(document.getElementById("selTaxManager").value || "") : "";

			try {
				var root = readRoot();
				if (!root.years) root.years = {};
				var pl = root.years[yearKey] || { items: {}, deleted: [] };
				pl.items = pl.items || {};
				if (editMode && editBudgetId && targetId !== editBudgetId) {
					var oldIt = pl.items[editBudgetId];
					if (oldIt) {
						pl.items[editBudgetId] = {
							name: oldIt.name != null ? oldIt.name : itemName(editBudgetId),
							alloc: oldIt.alloc != null ? oldIt.alloc : "",
							spent: "",
							approvalDate: "",
							note: "",
							taxManager: "",
							attachments: [],
							active: oldIt.active !== false
						};
					}
				}
				var it0 = pl.items[targetId] || {};
				var prevSpent = parseAmountPlain(it0.spent);
				var newSpent = editMode ? inpAmtVal : prevSpent + inpAmtVal;
				var outAppr = editMode ? apprVal : apprVal || (it0.approvalDate != null ? String(it0.approvalDate) : "");
				var outNote = editMode ? noteVal : noteVal !== "" ? noteVal : it0.note != null ? String(it0.note) : "";
				var outTax = editMode ? taxVal : taxVal || (it0.taxManager != null ? String(it0.taxManager) : "");
				var prevAtt = Array.isArray(it0.attachments) ? it0.attachments.slice() : [];
				var outAttachments = editMode
					? attachmentList.slice()
					: prevAtt.concat(attachmentList);
				pl.items[targetId] = {
					name: it0.name != null ? it0.name : itemName(targetId),
					alloc: it0.alloc != null ? it0.alloc : "",
					spent: Math.round(newSpent).toLocaleString("ko-KR"),
					approvalDate: outAppr,
					note: outNote,
					taxManager: outTax,
					attachments: outAttachments,
					active: it0.active !== false
				};
				root.years[yearKey] = pl;
				writeRoot(root);
			} catch (err1) {
				if (err1 && err1.name === "QuotaExceededError") {
					alert(
						"브라우저 저장 공간이 부족합니다.\n첨부 개수·용량을 줄이거나 파일을 나눈 뒤 다시 저장하세요."
					);
				}
				return;
			}

			var pathParts = [];
			pathParts.push(itemName(selHang.value));
			if (selMok.value) pathParts.push(itemName(selMok.value));
			if (selSemok.value) pathParts.push(itemName(selSemok.value));
			if (selDetail.value) pathParts.push(itemName(selDetail.value));

			alert(
				(editMode ? "수정되었습니다.\n" : "등록되었습니다.\n") +
					pathParts.join(" → ") +
					(apprVal ? "\n결재일: " + apprVal : "")
			);
			try {
				if (window.opener && typeof window.opener.renderExpenseDetailFromStorage === "function") {
					window.opener.renderExpenseDetailFromStorage();
				}
				if (window.opener && window.opener.applyBudgetTreeFromStorage) {
					window.opener.applyBudgetTreeFromStorage();
				} else if (window.opener && window.opener.location) {
					window.opener.location.reload();
				}
			} catch (err) {}
			window.close();
		}

		document.getElementById("btnSubmit").addEventListener("click", function (e) {
			e.preventDefault();
			trySubmit();
		});

		document.getElementById("expenseRegForm").addEventListener("submit", function (e) {
			e.preventDefault();
			trySubmit();
		});
	})();
	</script>
</body>
</html>
